name: Restart yjs-server

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 📦 Install sshpass
        run: sudo apt-get install -y sshpass

      - name: 🔑 Set up SSH known hosts
        env:
          SSH_SERVER: ${{ secrets.SSH_SERVER }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${SSH_SERVER#*@}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 🔄 Restart yjs-server
        env:
          SSH_SERVER: ${{ secrets.SSH_SERVER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: sshpass -p "$SSH_PASSWORD" ssh "$SSH_SERVER" "systemctl restart opendaw-yjs && systemctl status opendaw-yjs --no-pager"
